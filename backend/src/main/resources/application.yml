spring:
  datasource:
    url: jdbc:h2:mem:permdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # --- 切換 MSSQL 時，移除上方 h2/jpa 設定並取消下方的註解 ---
  # datasource:
  #   url: jdbc:sqlserver://HOST:1433;databaseName=PermissionDB;encrypt=true;trustServerCertificate=true
  #   username: sa
  #   password: your_password
  #   driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  # jpa:
  #   database-platform: org.hibernate.dialect.SQLServerDialect
  #   hibernate:
  #     ddl-auto: update

server:
  port: ${SERVER_PORT:8090}
  # 預設監聽全部網路介面；如需限制指定 IP，可設環境變數 SERVER_ADDRESS=192.168.x.x
  address: ${SERVER_ADDRESS:0.0.0.0}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://192.168.82.225:5173}
