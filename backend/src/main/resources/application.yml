spring:
  datasource:
    url: jdbc:h2:mem:permdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # --- 切換 MSSQL 時，移除上方 h2/jpa 設定並取消下方的註解 ---
  # datasource:
  #   url: jdbc:sqlserver://HOST:1433;databaseName=PermissionDB;encrypt=true;trustServerCertificate=true
  #   username: sa
  #   password: your_password
  #   driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  # jpa:
  #   database-platform: org.hibernate.dialect.SQLServerDialect
  #   hibernate:
  #     ddl-auto: update

server:
  port: 8090
  address: 192.168.82.225

cors:
  allowed-origins: http://localhost:5173,http://192.168.82.225:5173
